<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Admin Marcos Fisioterapia</title>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <!-- Navbar -->
    <nav class="dashboard-navbar">
      <div class="navbar-content">
        <div class="navbar-brand">
          <h1>Admin Panel</h1>
          <span class="badge">Pre-Staging</span>
        </div>
        <div class="navbar-actions">
          <button id="menuToggle" class="btn btn-ghost menu-toggle" aria-label="Abrir menú" aria-expanded="false">
            <span class="material-symbols-outlined">menu</span>
          </button>
          <button id="publishBtn" class="btn btn-success">
            <span class="material-symbols-outlined">publish</span>
            Publicar a Prod
          </button>
          <button id="logoutBtn" class="btn btn-ghost">
            <span class="material-symbols-outlined">logout</span>
          </button>
        </div>
      </div>
    </nav>

    <div class="dashboard-container">
      <!-- Sidebar -->
      <aside class="dashboard-sidebar">
        <div class="sidebar-close-wrapper">
          <button id="sidebarClose" class="btn btn-ghost sidebar-close" aria-label="Cerrar menú">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div class="sidebar-menu">
          <h3>Secciones</h3>
          <button class="menu-item active" data-section="hero">
            <span class="material-symbols-outlined">home</span>
            Hero
          </button>
          <button class="menu-item" data-section="services">
            <span class="material-symbols-outlined">medical_services</span>
            Servicios
          </button>
          <button class="menu-item" data-section="pathologies">
            <span class="material-symbols-outlined">local_hospital</span>
            Patologías
          </button>
          <button class="menu-item" data-section="pricing">
            <span class="material-symbols-outlined">payments</span>
            Tarifas
          </button>
          <button class="menu-item" data-section="contact">
            <span class="material-symbols-outlined">mail</span>
            Contacto
          </button>
        </div>

        <div class="sidebar-info">
          <h4>Información</h4>
          <p id="syncStatus" class="status synced">
            <span class="dot"></span>
            Sincronizado
          </p>
          <button id="viewHistory" class="btn btn-sm btn-ghost">
            Ver historial
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="dashboard-main">
        <div id="contentArea" class="content-area">
          <!-- Contenido dinámico se carga aquí -->
        </div>
      </main>
    </div>
  </div>

  <!-- Modales -->
  <div id="historyModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Historial de Cambios</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="historyList" class="history-list"></div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
