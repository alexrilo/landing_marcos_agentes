<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Marcos Fisioterapia</title>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="brand">Marcos Fisioterapia</h1>
        <p class="subtitle">Panel de Administración</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Ingresa tu contraseña"
            required
            autofocus
          >
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          <span>Acceder</span>
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>

        <div id="loginError" class="error-message" style="display: none;"></div>
      </form>

      <div class="login-footer">
        <p>Panel seguro - Cambios automáticos en GitHub</p>
      </div>
    </div>

    <div class="login-info">
      <div class="info-card">
        <span class="material-symbols-outlined">security</span>
        <h3>Seguro</h3>
        <p>Acceso protegido con token JWT</p>
      </div>
      <div class="info-card">
        <span class="material-symbols-outlined">storage</span>
        <h3>Versionado</h3>
        <p>Cambios guardados en GitHub</p>
      </div>
      <div class="info-card">
        <span class="material-symbols-outlined">devices</span>
        <h3>Responsive</h3>
        <p>Funciona en cualquier dispositivo</p>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
